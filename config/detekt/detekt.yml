build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

output-reports:
  active: true

comments:
  active: true
  CommentOverPrivateFunction: { active: false }
  CommentOverPrivateProperty: { active: false }
  UndocumentedPublicClass: { active: false }
  UndocumentedPublicFunction: { active: false }
  UndocumentedPublicProperty: { active: false }

complexity:
  active: true
  CyclomaticComplexMethod: { active: true, threshold: 15 }
  LongMethod: { active: true, threshold: 60 }
  LongParameterList: { active: true, functionThreshold: 8, constructorThreshold: 8 }
  TooManyFunctions: { active: true, thresholdInFiles: 20, thresholdInClasses: 15 }

coroutines:
  active: true
  GlobalCoroutineUsage: { active: true }
  RedundantSuspendModifier: { active: true }
  SuspendFunWithCoroutineScopeReceiver: { active: true }

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught: { active: true }
  TooGenericExceptionThrown: { active: true }

formatting:
  active: true
  android: true
  autoCorrect: true
  AnnotationOnSeparateLine: { active: false }
  EnumEntryNameCase: { active: false }
  ImportOrdering: { active: false }
  MaximumLineLength: { active: true, maxLineLength: 140 }
  NoWildcardImports: { active: false }
  TrailingCommaOnCallSite: { active: false }
  TrailingCommaOnDeclarationSite: { active: false }

naming:
  active: true
  FunctionNaming: { active: true, ignoreAnnotated: ["Composable"] }
  InvalidPackageDeclaration: { active: false }
  NoNameShadowing: { active: true }
  TopLevelPropertyNaming: { active: true }
  VariableNaming: { active: true }

performance:
  active: true
  ArrayPrimitive: { active: true }
  ForEachOnRange: { active: true }
  SpreadOperator: { active: true, excludedFunctions: ["arrayOf", "listOf", "mapOf"] }

potential-bugs:
  active: true
  AvoidReferentialEquality: { active: true }
  DontDowncastCollectionTypes: { active: true }
  ElseCaseInWhenExpression: { active: true }
  EqualsAlwaysReturnsTrueOrFalse: { active: true }
  LateinitUsage: { active: false }
  NullableToStringCall: { active: true }
  UnreachableCode: { active: true }
  UnsafeCallOnNullableType: { active: true }
  UnsafeCast: { active: true }

style:
  active: true
  ForbiddenComment: { active: true, values: ["FIXME:", "STOPSHIP:"], allowedPatterns: "" }
  MagicNumber: { active: true, ignoreAnnotated: ["Composable"], ignoreNumbers: ["-1", "0", "1", "2", "100", "1000"] }
  MaxLineLength: { active: true, maxLineLength: 140, excludeImportStatements: true }
  ReturnCount: { active: true, max: 4 }
  UnusedImports: { active: true }
  WildcardImport: { active: false }
