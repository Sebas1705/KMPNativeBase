name: Changelog label gate

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

jobs:
  require-label:
    name: Require changelog label
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for changelog label
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const required = ['breaking', 'feature', 'fix', 'chore', 'docs', 'deps', 'ci', 'skip-changelog', 'dependencies'];
            const hasRequired = labels.some(l => required.includes(l));
            if (!hasRequired) {
              core.setFailed(`PR must have one of: ${required.join(', ')}`);
            }