version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule: { interval: weekly, day: monday }
    groups:
      kotlin: { patterns: ["org.jetbrains.kotlin*"] }
      compose: { patterns: ["org.jetbrains.compose*", "org.jetbrains.androidx*"] }
      ktor: { patterns: ["io.ktor*"] }
      koin: { patterns: ["io.insert-koin*"] }
      sqldelight: { patterns: ["app.cash.sqldelight*"] }

  - package-ecosystem: github-actions
    directory: "/"
    schedule: { interval: weekly, day: monday }
